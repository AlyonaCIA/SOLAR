name: 'SOLAR — Setup Python'
description: 'Setup Python environment with uv for SOLAR'

inputs:
  python-version:
    required: false
    default: '3.12'
    description: 'Python version (3.12, 3.13)'

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'

    - name: Set up Python ${{ inputs.python-version }}
      run: uv python install ${{ inputs.python-version }}
      shell: bash

    - name: Cache uv packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: uv-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-py${{ inputs.python-version }}-

    - name: Sync project dependencies
      run: uv sync --extra dev
      shell: bash
