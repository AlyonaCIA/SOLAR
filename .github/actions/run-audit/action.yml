name: 'SOLAR — Security Scan'
description: 'Security scanning with bandit for SOLAR'

runs:
  using: composite
  steps:
    - name: Run bandit security scan
      run: uv run bandit -r src/ API/app/ -ll -f json -o bandit-report.json || true
      shell: bash
      continue-on-error: true

    - name: Display bandit results
      run: uv run bandit -r src/ API/app/ -ll
      shell: bash
      continue-on-error: true
